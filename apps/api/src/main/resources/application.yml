server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
spring:
  application:
    name: reinasleo-api
  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reinasleo}
    username: ${DB_USER:reinasleo}
    password: ${DB_PASSWORD:reinasleo}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  cors:
    allowed-origins:
      - ${CORS_ORIGIN:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:reinasleo-dev-secret-key-change-in-production-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  bot:
    api-secret: ${BOT_API_SECRET:dev-bot-secret}
    username: ${BOT_USERNAME:reinasleo_bot}
  upload:
    dir: ${UPLOAD_DIR:uploads}
