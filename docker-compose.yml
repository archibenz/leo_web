services:
  postgres:
    image: postgres:16-alpine
    container_name: reinasleo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: reinasleo
      POSTGRES_USER: reinasleo
      POSTGRES_PASSWORD: reinasleo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reinasleo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
